<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Water Tracker 💧</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #74ebd5, #9face6);
      padding: 20px;
    }

    .box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      max-width: 300px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    h2 {
      margin-bottom: 10px;
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: green;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }

    .progress {
      width: 100%;
      height: 10px;
      background: #ddd;
      border-radius: 10px;
      margin-top: 10px;
      overflow: hidden;
    }

    .bar {
      height: 10px;
      width: 0%;
      background: green;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>💧 Water Tracker</h2>

    <h3 id="count">0 / 2000 ml</h3>

    <button onclick="addWater(250)">+250ml</button>
    <button onclick="addWater(500)">+500ml</button>

    <br><br>
    <button onclick="reset()">Reset</button>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>
  </div>

  <script src="app.js"></script>

</body>
</html>
